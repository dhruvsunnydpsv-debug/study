<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CBSE question paper creator with step-by-step subject, difficulty and test type selection."
    />
    <meta name="theme-color" content="#0b1226" />
    <title>CBSE Paper Creator | Study Vault</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #070b16;
        --surface: rgba(255, 255, 255, 0.04);
        --surface-hover: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --text-dim: #a1a1aa;
        --accent: #22c55e;
        --accent-glow: rgba(34, 197, 94, 0.35);
        --gold: #f6c866;
        --gold-glow: rgba(246, 200, 102, 0.25);
        --zinc-800: #27272a;
        --zinc-900: #18181b;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background:
          radial-gradient(
            circle at 18% 10%,
            rgba(255, 255, 255, 0.08),
            transparent 38%
          ),
          radial-gradient(
            circle at 84% 18%,
            rgba(255, 255, 255, 0.06),
            transparent 36%
          ),
          linear-gradient(180deg, #252d3e 0%, #151c2c 100%);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .aurora {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(
          circle at 50% -20%,
          rgba(255, 255, 255, 0.07),
          transparent 70%
        );
      }

      .app {
        position: relative;
        z-index: 1;
        max-width: 1000px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 24px;
      }

      #selection-view {
        min-height: calc((100vh - 48px) / 1.2);
        width: 100%;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 18px;
        zoom: 1.2;
      }

      @supports not (zoom: 1.2) {
        #selection-view {
          transform: scale(1.2);
          transform-origin: center top;
        }
      }

      .hero-title {
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #fff;
        line-height: 1;
        margin-bottom: 16px;
        text-align: center;
        text-shadow: 0 0 26px rgba(246, 200, 102, 0.14);
      }

      .hero-sub {
        color: var(--text-dim);
        text-align: center;
        max-width: 680px;
        margin: 0 auto 20px;
        font-size: 1.1rem;
        font-weight: 400;
        letter-spacing: -0.01em;
      }

      .flow-hint {
        text-align: center;
        color: #f6d693;
        font-size: 0.82rem;
        margin: 0;
        letter-spacing: 0.02em;
      }

      .direction-title {
        text-align: center;
        color: #f7deaa;
        font-family: "Noto Serif", "Inter", serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        margin: 0;
      }

      .direction-box {
        max-width: 640px;
        margin: 0 auto 26px;
        min-height: 16px;
        padding: 8px 16px;
        border-radius: 14px;
        border: 1px solid rgba(246, 200, 102, 0.36);
        background: rgba(52, 40, 14, 0.22);
        position: relative;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .direction-box::before,
      .direction-box::after {
        content: "◆";
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.56rem;
        color: rgba(246, 200, 102, 0.8);
        pointer-events: none;
      }

      .direction-box::before {
        left: 10px;
      }

      .direction-box::after {
        right: 10px;
      }

      .direction-box-inner {
        position: absolute;
        inset: -7px;
        border: 1px solid rgba(246, 200, 102, 0.2);
        border-radius: 18px;
        pointer-events: none;
      }

      .form-card {
        background:
          radial-gradient(
            circle at 10% 10%,
            rgba(246, 200, 102, 0.12),
            transparent 28%
          ),
          radial-gradient(
            circle at 92% 86%,
            rgba(246, 200, 102, 0.08),
            transparent 30%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.12) 0%,
            rgba(255, 255, 255, 0.05) 50%,
            rgba(255, 255, 255, 0.03) 100%
          ),
          rgba(16, 20, 30, 0.35);
        border: 1px solid rgba(246, 200, 102, 0.24);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 32px;
        padding: 48px;
        width: min(720px, 100%);
        max-width: 720px;
        margin: 0 auto;
        position: relative;
        overflow: visible;
        box-shadow:
          0 26px 50px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(246, 200, 102, 0.08);
      }

      .form-card::before,
      .form-card::after {
        content: "";
        position: absolute;
        border-radius: 36px;
        pointer-events: none;
      }

      .form-card::before {
        inset: -10px;
        border: 1px solid rgba(246, 200, 102, 0.34);
      }

      .form-card::after {
        inset: -18px;
        border: 1px solid rgba(246, 200, 102, 0.14);
      }

      .form-label {
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #f2d08a;
        margin-bottom: 20px;
        display: block;
        text-align: center;
      }

      .step-state {
        margin: 8px 0 28px;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid rgba(246, 200, 102, 0.22);
        background: rgba(40, 30, 10, 0.22);
        color: #f8e5b6;
        font-size: 0.82rem;
        text-align: center;
      }

      .selection-stage {
        display: none;
        animation: stage-in 0.28s ease;
        max-width: 640px;
        margin: 0 auto;
        width: 100%;
      }

      .selection-stage.active {
        display: block;
      }

      .stage-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 8px;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      .stage-actions .create-btn {
        margin-top: 2px;
        width: 100%;
      }

      .ghost-btn {
        border-radius: 100px;
        border: 1px solid rgba(246, 200, 102, 0.26);
        background: rgba(20, 16, 8, 0.35);
        color: #f6d693;
        padding: 14px 20px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        width: 100%;
        min-width: 0;
        text-align: center;
        justify-self: stretch;
      }

      .subject-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 28px;
        max-width: 620px;
        margin-left: auto;
        margin-right: auto;
      }

      .subject-btn {
        min-height: 74px;
        padding: 18px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--zinc-900);
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 0.9rem;
        font-weight: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 8px;
      }

      .subject-btn:hover {
        border-color: rgba(255, 255, 255, 0.3);
        background: var(--zinc-800);
        color: #fff;
      }

      .subject-btn.active {
        background: rgba(20, 47, 31, 0.94);
        border-color: var(--accent);
        color: #d1fae5;
        box-shadow: 0 0 20px var(--accent-glow);
      }

      .difficulty-selector {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 26px;
        max-width: 620px;
        margin-left: auto;
        margin-right: auto;
      }

      .test-type-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-width: 500px;
      }

      .diff-btn {
        min-height: 52px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--zinc-900);
        color: var(--text-dim);
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.8rem;
        font-weight: 500;
        text-align: center;
      }

      .diff-btn:hover {
        border-color: rgba(255, 255, 255, 0.2);
        color: #fff;
      }

      .diff-btn.active {
        background: var(--zinc-800);
        border-color: var(--accent);
        color: #bbf7d0;
        box-shadow: 0 0 15px var(--accent-glow);
      }

      .diff-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .create-btn {
        width: 100%;
        padding: 20px;
        border-radius: 100px;
        border: 1px solid #22c55e;
        background: linear-gradient(120deg, #166534, #22c55e);
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 1.1rem;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .create-btn:hover:not(:disabled) {
        border-color: #86efac;
        box-shadow: 0 0 25px var(--accent-glow);
        transform: translateY(-2px);
      }

      .create-btn:disabled {
        opacity: 0.2;
        cursor: not-allowed;
      }

      @keyframes stage-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #paper-view {
        display: none;
      }

      .paper-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 40px;
      }

      .action-btn {
        padding: 12px 28px;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: var(--zinc-900);
        color: #fff;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 500;
        transition: 0.2s;
      }

      .action-btn:hover {
        border-color: #fff;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      }

      .stats-bar {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin-bottom: 24px;
        font-size: 0.8rem;
        color: var(--text-dim);
      }

      .stats-bar span {
        background: var(--surface);
        padding: 6px 16px;
        border-radius: 100px;
        border: 1px solid var(--border);
      }

      /* PDF Fix - Strict White Theme for Examination Paper */
      .paper {
        background: #ffffff !important;
        color: #000000 !important;
        padding: 40px 60px;
        font-family: "Noto Serif", "Inter", serif !important;
        line-height: 1.6;
        max-width: 850px;
        margin: 0 auto;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        /* border-gray-200 */
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
        /* shadow-xl */
      }

      .paper-header {
        text-align: center;
        margin-bottom: 32px;
        border-bottom: 2px solid #000;
        padding-bottom: 24px;
      }

      .paper-header .school-line {
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        color: #444;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .paper-header .exam-line {
        font-weight: 700;
        font-size: 1.4rem;
        letter-spacing: 0;
        color: #000;
        margin-bottom: 4px;
      }

      .paper-header .subject-line {
        font-size: 1.1rem;
        color: #222;
        font-weight: 600;
      }

      .paper-meta {
        display: flex;
        justify-content: space-between;
        gap: 0;
        padding: 12px 0;
        font-size: 0.85rem;
        color: #000;
        border-bottom: 1px solid #ccc;
        margin-bottom: 24px;
        font-weight: 600;
      }

      .paper-instructions {
        background: #f9f9f9;
        border: 1px solid #ddd;
        padding: 24px;
        border-radius: 0;
        margin-bottom: 40px;
        font-size: 0.85rem;
        color: #333;
      }

      .paper-instructions strong {
        color: #000;
        display: block;
        margin-bottom: 8px;
      }

      .section-header {
        font-weight: 700;
        font-size: 1.1rem;
        background: #eee;
        padding: 8px 16px;
        margin: 40px 0 24px;
        color: #000;
        border-left: 5px solid #000;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .section-header .q-range {
        font-weight: 600;
        color: #555;
        font-size: 0.8rem;
      }

      .question {
        margin-bottom: 24px;
        display: flex;
        gap: 16px;
        page-break-inside: avoid;
      }

      .q-num {
        font-weight: 700;
        color: #000;
        width: 32px;
        flex-shrink: 0;
        font-size: 0.95rem;
      }

      .q-body {
        flex: 1;
        font-size: 0.95rem;
        color: #111;
      }

      .q-marks {
        color: #000;
        font-weight: 700;
        font-size: 0.8rem;
        margin-top: 4px;
        display: block;
        white-space: nowrap;
      }

      .mcq-options {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 12px;
      }

      .mcq-opt {
        padding: 8px 12px;
        border-radius: 4px;
        border: 1px solid #eee;
        background: #fff;
        font-size: 0.9rem;
        color: #333;
      }

      .passage-box {
        background: #f8f8f8;
        padding: 16px 20px;
        border-radius: 0;
        margin: 16px 0;
        border-left: 3px solid #ccc;
        font-size: 0.9rem;
        color: #222;
        font-style: italic;
      }

      .sub-part {
        padding-left: 20px;
        border-left: 1px solid #ccc;
        margin-bottom: 12px;
        font-size: 0.9rem;
        color: #222;
      }

      .sub-part::before {
        display: none;
      }

      .assertion-block .ar-label {
        font-weight: 700;
        color: #000;
      }

      .ak-item {
        background: #f0f0f0;
        border: 1px solid #ccc;
        color: #000;
        font-weight: 600;
      }

      .answer-key h3 {
        color: #000;
        border-bottom: 2px solid #000;
        padding-bottom: 8px;
      }

      /* Mobile */
      @media (max-width: 768px) {
        .app {
          min-height: 100vh;
          padding: 20px 16px;
        }

        #selection-view {
          min-height: calc((100vh - 40px) / 1.2);
        }

        .form-card {
          padding: 32px 24px;
        }

        .subject-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .difficulty-selector {
          grid-template-columns: repeat(2, 1fr);
        }

        .test-type-grid {
          max-width: 100%;
        }

        .hero-title {
          font-size: 2.5rem;
        }

        .stage-actions {
          max-width: 100%;
        }

        .ghost-btn {
          width: 100%;
          justify-self: stretch;
        }

        .mcq-options {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 400px) {
        #selection-view {
          min-height: auto;
        }

        .subject-grid {
          grid-template-columns: 1fr 1fr;
        }

        .test-type-grid {
          grid-template-columns: 1fr;
        }

        .paper {
          padding: 12px 10px;
          font-size: 0.78rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="aurora">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <div class="app">
      <div id="selection-view">
        <h1 class="hero-title">CBSE Paper Creator</h1>
        <p class="hero-sub">
          Exact 2025-26 Pattern | Official Blueprint Compliant | Diagrams &
          Internal Choice
        </p>
        <div class="form-card">
          <div class="direction-box">
            <span class="direction-box-inner" aria-hidden="true"></span>
            <p class="direction-title" id="mini-title">Select Subject</p>
          </div>
          <div class="selection-stage active" id="stage-subject">
            <div class="subject-grid">
              <button class="subject-btn" onclick="setSubject(this, 'Maths')">
                Maths
              </button>
              <button class="subject-btn" onclick="setSubject(this, 'Science')">
                Science
              </button>
              <button
                class="subject-btn"
                onclick="setSubject(this, 'Social Science')"
              >
                Social Science
              </button>
              <button class="subject-btn" onclick="setSubject(this, 'English')">
                English
              </button>
              <button class="subject-btn" onclick="setSubject(this, 'Hindi')">
                Hindi
              </button>
              <button
                class="subject-btn"
                onclick="setSubject(this, 'Sanskrit')"
              >
                Sanskrit
              </button>
            </div>
          </div>

          <div class="selection-stage" id="stage-settings">
            <label class="form-label">Difficulty Level</label>
            <div class="difficulty-selector">
              <button
                class="diff-btn diff-level-btn"
                onclick="setDiff(this, 'Mixed')"
              >
                Mixed
              </button>
              <button
                class="diff-btn diff-level-btn"
                onclick="setDiff(this, 'Easy')"
              >
                Easy
              </button>
              <button
                class="diff-btn diff-level-btn"
                onclick="setDiff(this, 'Medium')"
              >
                Medium
              </button>
              <button
                class="diff-btn diff-level-btn"
                onclick="setDiff(this, 'Hard')"
              >
                Hard
              </button>
            </div>

            <label class="form-label">Type of Test</label>
            <div class="difficulty-selector test-type-grid">
              <button
                class="diff-btn mode-btn"
                id="mode-annual"
                onclick="setMode(this, 'Annual')"
              >
                Annual (80m)
              </button>
              <button
                class="diff-btn mode-btn"
                id="mode-ut"
                onclick="setMode(this, 'UT')"
              >
                Unit Test (40m)
              </button>
            </div>

            <div class="step-state" id="step-state">Now choose difficulty.</div>

            <div class="stage-actions">
              <button
                class="ghost-btn"
                type="button"
                onclick="goToSubjectStage()"
              >
                Back to Subject
              </button>
              <button
                class="create-btn"
                id="create-btn"
                onclick="createPaper()"
                disabled
              >
                Generate Question Paper
              </button>
            </div>
          </div>
          <div
            id="error-msg"
            style="
              color: #f87171;
              margin-top: 10px;
              font-size: 0.8rem;
              display: none;
            "
          ></div>
        </div>
      </div>
      <div id="paper-view">
        <div class="paper-actions">
          <button class="action-btn" onclick="location.reload()">
            â† New Paper
          </button>
          <button class="action-btn" onclick="toggleAnswers()" id="ans-btn">
            Show Answer Key
          </button>
          <button
            class="action-btn"
            onclick="window.print()"
            style="background: var(--accent); color: white; border: none"
          >
            ðŸ–¨ Print / PDF
          </button>
        </div>
        <div class="stats-bar" id="stats-bar"></div>
        <div id="paper-content"></div>
      </div>
    </div>

      function setSetupStage(stage) {
        setupStage = stage;
        const subjectStage = document.getElementById("stage-subject");
        const settingsStage = document.getElementById("stage-settings");
        const miniTitle = document.getElementById("mini-title");
        const err = document.getElementById("error-msg");

        subjectStage.classList.toggle("active", stage === "subject");
        settingsStage.classList.toggle("active", stage === "settings");

        if (miniTitle) {
          if (stage === "subject") {
            miniTitle.textContent = "Select Subject";
          } else {
            const subjectForTitle = selectedSubject || "Paper";
            miniTitle.textContent = `${subjectForTitle} Blueprint Setup`;
          }
        }
        if (err) err.style.display = "none";
      }

      function goToSubjectStage() {
        setSetupStage("subject");
      }

      function goToSettingsStage() {
        if (!selectedSubject) return;
        setSetupStage("settings");
      }

      function updateStepStateUI() {
        const hasSubject = Boolean(selectedSubject);
        const hasDiff = Boolean(selectedDiff);
        const hasMode = Boolean(selectedMode);
        const createBtn = document.getElementById("create-btn");
        const step = document.getElementById("step-state");

        document.querySelectorAll(".diff-level-btn").forEach((b) => {
          b.disabled = !hasSubject;
        });
        document.querySelectorAll(".mode-btn").forEach((b) => {
          b.disabled = !hasDiff;
        });

        createBtn.disabled = !(hasSubject && hasDiff && hasMode);

        if (step) {
          if (!hasSubject) {
            step.textContent = "Choose subject first.";
          } else if (!hasDiff) {
            step.textContent = "Now choose difficulty.";
          } else if (!hasMode) {
            step.textContent = "Now choose type of test.";
          } else {
            step.textContent = `Ready: ${selectedSubject} | ${selectedDiff} | ${selectedMode}`;
          }
        }
      }

      function setSubject(btn, s) {
        document
          .querySelectorAll(".subject-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        selectedSubject = s === "Maths" ? "Mathematics" : s;

        selectedDiff = null;
        selectedMode = null;
        document
          .querySelectorAll(".diff-level-btn, .mode-btn")
          .forEach((b) => b.classList.remove("active"));
        updateStepStateUI();
        goToSettingsStage();
      }

      function setDiff(btn, d) {
        if (!selectedSubject) return;
        document
          .querySelectorAll(".diff-level-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        selectedDiff = d;

        selectedMode = null;
        document
          .querySelectorAll(".mode-btn")
          .forEach((b) => b.classList.remove("active"));
        updateStepStateUI();
      }

      function setMode(btn, m) {
        if (!selectedDiff) return;
        document
          .querySelectorAll(".mode-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        selectedMode = m;
        updateStepStateUI();
      }

      function parseFig(text) {
        const imgM = text.match(/\[Image:\s*([^\]]+)\]/i);
        const figM = text.match(/\[Figure:\s*([^\]]+)\]/i);
        const diagM = text.match(/\[Diagram:\s*([^\]]+)\]/i);
        const m = imgM || figM || diagM;
        if (m)
          return { url: m[1].trim(), clean: text.replace(m[0], "").trim() };
        return { url: null, clean: text };
      }

                  desc: "Mixed Pattern Review",
                  perQ: 1,
                  count: 30,
                },
              ],
            };
          }

          // V3.4: Randomized Retrieval Engine (RPC)
          const fetchRandom = async (sub, marks, lim = 25) => {
            const { data, error } = await db.rpc("get_random_questions", {
              sub: sub,
              m: marks,
              lim: lim,
              diff: selectedDiff !== "Mixed" ? selectedDiff : null
            });

            if (error) {
              let query = db
                .from("class9_question_bank")
                .select("*")
                .eq("subject", sub)
                .eq("marks", marks);

              if (selectedDiff !== "Mixed") {
                query = query.eq("difficulty", selectedDiff);
              }

              const { data: fbData } = await query.limit(lim);
              return (fbData || []).sort(() => Math.random() - 0.5);
            }
            return data || [];
          };

          // Dynamic Pool Harvester V3.6
          const neededMarks = new Set([1]); // Always need 1-mark for fallback
          bp.sections.forEach((sec) => {
            if (sec.perQ) neededMarks.add(sec.perQ);
            if (sec.fixedSections)
              sec.fixedSections.forEach((fs) => {
                if (fs.perQ) neededMarks.add(fs.perQ);
              });
          });

          const fetchResults = await Promise.all(
            Array.from(neededMarks).map(async (m) => {
              const questions = await fetchRandom(selectedSubject, m, 30);
              return [m, questions];
            }),
          );

          // Add 'all' pool for general fallback
          const vAll = await fetchRandom(selectedSubject, 1, 50);
          const POOLS = Object.fromEntries(fetchResults);
          POOLS["all"] = vAll;

          paperCount++;
          currentAnswers = [];
          let gNum = 0,
            used = new Set();
          let html = renderPaperCore(bp, selectedMode);

          bp.sections.forEach((sec) => {
            let marks =
              sec.perQ ||
              (sec.qType === "case" ? 4 : sec.qType === "map" ? 5 : 1);
            let pool = [...(POOLS[marks] || [])].filter((q) => !used.has(q.id));
            let startQ = gNum + 1;
            let secCount = 0;
            let tempHtml = "";

            // COORDINATOR: Handle Empty Pools - NO MCQ BLEED (V3.4)
            if (pool.length < sec.count && sec.count > 0) {
              // Only fallback to 'all' if the question type matches or it's a general section
              const fallbackPool = [...POOLS["all"]].filter((q) => {
                if (used.has(q.id)) return false;
                if (marks >= 3 && q.marks < 3) return false; // Strict Subjective Shield
                return true;
              });
              pool = [...pool, ...fallbackPool];
            }

            if (sec.count > 0) {
              for (let i = 0; i < sec.count; i++) {
                let q = pool.find((p) => !used.has(p.id));

                if (!q) {
                  gNum++;
                  secCount++;
                  tempHtml += `<div class="question"><span class="q-num">${gNum}.</span><div class="q-body">
                                    <div style="background:#fefce8;border:1px dashed #eab308;padding:16px;border-radius:4px;color:#854d0e;font-size:0.85rem">
                                        <strong>Question Pending</strong> — Verix Harvester v2.1 is currently scraping additional ${marks}-mark questions for ${selectedSubject}.
                                    </div>
                                </div><span class="q-marks">[${marks}]</span></div>`;
                  continue;
                }

                gNum++;
                secCount++;
                used.add(q.id);

                // V3.5 Diagram/Map/Data Cues
                if (
                  sec.forceMap ||
                  (sec.qType === "map" && selectedSubject === "Social Science")
                ) {
                  q.diagram_url =
                    "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/India_map_political.svg/800px-India_map_political.svg.png";
                  q.question_text = `**Map Pointing (Section F):** (a) Two Historical locations identified. (b) Three Geographical features identified. \n\n ${q.question_text}`;
                }
                if (
                   sec.forceDiagram ||
                   (sec.qType === "diagram")
                ) {
                   q.diagram_url = "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Anatomy_of_the_Human_Ear.svg/600px-Anatomy_of_the_Human_Ear.svg.png";
                   q.question_text = `**Diagram Based Question:** Observe the diagram below and answer the following questions. \n\n ${q.question_text || ""}`;
                }
                if (
                  sec.forceDataCue ||
                  (sec.id === "B" &&
                    selectedSubject === "English" &&
                    i === sec.count - 1)
                ) {
                  q.diagram_url =
                    "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Simple_bar_graph.svg/600px-Simple_bar_graph.svg.png";
                  q.question_text = `**Analytical Writing:** Based on the visual data provided below, write an analytical paragraph... \n\n ${q.question_text || ""}`;
                }

                const isAR =
                  (sec.hasAR || q.question_type?.includes("Assertion")) &&
                  gNum >= (sec.arStart || 999);

                if (sec.qType === "case" || q.question_type?.includes("Case")) {
                  tempHtml += renderCase(q, gNum, sec);
                } else {
                  tempHtml += renderQ(q, gNum, marks || q.marks, { isAR });
                }
                if (q.correct_answer)
                  currentAnswers.push({ num: gNum, ans: q.correct_answer });
              }
            }

            if (sec.fixed && sec.fixedSections) {
              sec.fixedSections.forEach((fs) => {
                tempHtml += `<div style="font-weight:700;font-size:1rem;margin:24px 0 16px;color:#000;border-bottom:1px solid #eee">${fs.label}</div>`;
                if (fs.count > 0) {
                  let fsPool = [...(POOLS[fs.perQ] || POOLS[1])].filter(
                    (q) => !used.has(q.id),
                  );
                  for (let i = 0; i < fs.count; i++) {
                    let q = fsPool.find((p) => !used.has(p.id));
                    if (q) {
                      gNum++;
                      used.add(q.id);
                      tempHtml += renderQ(q, gNum, fs.perQ);
                    }
                  }
                } else if (fs.fixedNote) {
                  tempHtml += `<div class="passage-box">${fs.fixedNote}</div>`;
                }
              });
            }

            if (tempHtml) {
              html += `<div class="section-header">${sec.title} — ${sec.desc} <span class="q-range">Q.${startQ} to Q.${gNum}</span></div>`;
              html += tempHtml;
            }
          });

          html += `<div style="text-align:center;margin-top:100px;font-size:0.8rem;color:var(--text-dim);padding-top:40px">— End of Question Paper —</div></div>`;
          document.getElementById("paper-content").innerHTML = html;
          document.getElementById("selection-view").style.display = "none";
          document.getElementById("paper-view").style.display = "block";
          updateStatsBar(gNum);
        } catch (e) {
          err.textContent = e.message;
          err.style.display = "block";
        } finally {
          btn.disabled = !(selectedSubject && selectedDiff && selectedMode);
          btn.textContent = "Generate Question Paper";
        }
      }

      function renderPaperCore(bp, mode) {
        return `<div class="paper ${bp.lang || ""}">
                <div class="paper-header">
                    <div class="school-line">Central Board of Secondary Education</div>
                    <div class="exam-line">${mode === "UT" ? "PERIODIC TEST" : "ANNUAL EXAMINATION"} (2025-26)</div>
                    <div class="subject-line">${bp.fullName} • Class IX</div>
                </div>
                <div class="paper-meta">
                    <span>Time Allowed: ${bp.time}</span>
                    <span>Max Marks: ${bp.maxMarks}</span>
                </div>
                <div class="paper-instructions">
                    <strong>General Instructions:</strong>
                    <ol>${bp.inst.map((i) => `<li>${i}</li>`).join("")}</ol>
                </div>`;
      }

      function validateUrl(url) {
        if (!url) return false;
        return (
          url.startsWith("http") ||
          url.startsWith("https") ||
          url.startsWith("data:image")
        );
      }

      function renderQ(q, num, marks, opts = {}) {
        const raw = q.question_text || "";
        const fig = parseFig(raw);
        let url = validateUrl(q.diagram_url || fig.url)
          ? q.diagram_url || fig.url
          : null;
        let text = fig.clean;
        let html = `<div class="question"><span class="q-num">${num}.</span><div class="q-body">`;

        if (url)
          html += `<div class="figure-box"><img src="${url}" class="q-image" referrerpolicy="no-referrer" onerror="this.style.display='none';"></div>`;

        if (opts.isAR) {
          html += `<div class="assertion-block">
                    <p><span class="ar-label">Assertion (A):</span> ${text}</p>
                    <p><span class="ar-label">Reason (R):</span> ${q.correct_answer_explanation || "The reason provided explains the assertion."}</p>
                    <div class="mcq-options single-col">
                        <div class="mcq-opt">(a) Both A and R are true and R is the correct explanation of A.</div>
                        <div class="mcq-opt">(b) Both A and R are true but R is not the correct explanation of A.</div>
                        <div class="mcq-opt">(c) A is true but R is false.</div>
                        <div class="mcq-opt">(d) A is false but R is true.</div>
                    </div>
                </div>`;
        } else if (q.option_a) {
          const singleCol =
            text.length > 100 || (q.option_a && q.option_a.length > 40);
          html += `<p>${text}</p><div class="mcq-options ${singleCol ? "single-col" : ""}">
                    <div class="mcq-opt">(a) ${q.option_a}</div>
                    <div class="mcq-opt">(b) ${q.option_b}</div>
                    <div class="mcq-opt">(c) ${q.option_c}</div>
                    <div class="mcq-opt">(d) ${q.option_d}</div>
                </div>`;
        } else {
          html += `<p>${text}</p>`;
        }

        html += `</div><span class="q-marks">[${marks}]</span></div>`;
        return html;
      }

      function renderCase(q, gNum, sec) {
        const fig = parseFig(q.question_text || "");
        let url = validateUrl(q.diagram_url || fig.url)
          ? q.diagram_url || fig.url
          : null;
        let html = `<div class="question"><span class="q-num">${gNum}.</span><div class="q-body">`;
        if (url)
          html += `<div class="figure-box"><img src="${url}" class="q-image" referrerpolicy="no-referrer" onerror="this.style.display='none';"></div>`;
        const caseText = fig.clean;
        const subMatch = caseText.match(/\((i|a)\)/);
        if (subMatch) {
          const passage = caseText.substring(0, subMatch.index).trim();
          const subText = caseText.substring(subMatch.index);
          html += `<div class="passage-box">${passage}</div>`;
          const subs = subText.match(/\((?:i|ii|iii|iv|a|b|c|d)\)[^(]*/g);
          if (subs) {
            html += `<div class="sub-parts">`;
            subs.forEach((s, idx) => {
              const m =
                sec.caseSubParts && sec.caseSubParts[idx]
                  ? sec.caseSubParts[idx]
                  : 1;
              html += `<div class="sub-part">${s.trim()} <span class="q-marks">[${m}]</span></div>`;
            });
            html += `</div>`;
          }
        } else {
          html += `<div class="passage-box">${caseText}</div>`;
        }
        html += `</div><span class="q-marks">[${sec.perQ}]</span></div>`;
        return html;
      }

      function toggleAnswers() {
        const btn = document.getElementById("ans-btn");
        const existing = document.getElementById("answer-key-section");
        if (existing) {
          existing.remove();
          btn.textContent = "Show Answer Key";
        } else {
          let html = `<div id="answer-key-section" class="answer-key"><h3>Answer Key / Marking Scheme</h3><div class="ak-grid">`;
          currentAnswers.forEach((a) => {
            html += `<div class="ak-item">Q.${a.num}: <strong>${a.ans}</strong></div>`;
          });
          html += `</div></div>`;
          document
            .getElementById("paper-content")
            .insertAdjacentHTML("beforeend", html);
          btn.textContent = "Hide Answer Key";
          window.scrollTo(0, document.body.scrollHeight);
        }
      }

      function updateStatsBar(gCount) {
        document.getElementById("stats-bar").innerHTML = `
                <span>📄 ${selectedMode} • #${paperCount}</span>
                <span>✅ ${gCount} Questions Generated</span>
                <span>✨ Wispr Flow Engine V2.8</span>
            `;
      }

      setSetupStage("subject");
      updateStepStateUI();
    </script>
  </body>
</html>
