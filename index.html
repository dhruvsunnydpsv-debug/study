        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #000000;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --accent: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.3);
            --zinc-800: #27272a;
            --zinc-900: #18181b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 50% -20%, rgba(6, 182, 212, 0.15), transparent 70%);
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 24px
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #fff;
            line-height: 1;
            margin-bottom: 16px;
            text-align: center
        }

        .hero-sub {
            color: var(--text-dim);
            text-align: center;
            max-width: 600px;
            margin: 0 auto 56px;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: -0.01em
        }

        .form-card {
            background: transparent;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 48px;
            max-width: 680px;
            margin: 0 auto;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 20px;
            display: block
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 40px
        }

        .subject-btn {
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--zinc-900);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px
        }

        .subject-btn:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: var(--zinc-800);
            color: #fff
        }

        .subject-btn.active {
            background: #fff;
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2)
        }

        .difficulty-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 32px
        }

        .diff-btn {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--zinc-900);
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            font-weight: 500
        }

        .diff-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff
        }

        .diff-btn.active {
            background: var(--zinc-800);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow)
        }

        .create-btn {
            width: 100%;
            padding: 20px;
            border-radius: 100px;
            border: 1px solid var(--zinc-700);
            background: linear-gradient(to right, var(--zinc-800), var(--zinc-900));
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .create-btn:hover:not(:disabled) {
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-2px);
        }

        .create-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed
        }

        #paper-view {
            display: none
        }

        .paper-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .action-btn {
            padding: 12px 28px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--zinc-900);
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s
        }

        .action-btn:hover {
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1)
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 0.8rem;
            color: var(--text-dim)
        }

        .stats-bar span {
            background: var(--surface);
            padding: 6px 16px;
            border-radius: 100px;
            border: 1px solid var(--border)
        }

        /* PDF Fix - Strict White Theme for Examination Paper */
        .paper {
            background: #ffffff !important;
            color: #000000 !important;
            padding: 40px 60px;
            font-family: 'Noto Serif', 'Inter', serif !important;
            line-height: 1.6;
            max-width: 850px;
            margin: 0 auto;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            /* border-gray-200 */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            /* shadow-xl */
        }

        .paper-header {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 2px solid #000;
            padding-bottom: 24px;
        }

        .paper-header .school-line {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .paper-header .exam-line {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 0;
            color: #000;
            margin-bottom: 4px;
        }

        .paper-header .subject-line {
            font-size: 1.1rem;
            color: #222;
            font-weight: 600;
        }

        .paper-meta {
            display: flex;
            justify-content: space-between;
            gap: 0;
            padding: 12px 0;
            font-size: 0.85rem;
            color: #000;
            border-bottom: 1px solid #ccc;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .paper-instructions {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 24px;
            border-radius: 0;
            margin-bottom: 40px;
            font-size: 0.85rem;
            color: #333;
        }

        .paper-instructions strong {
            color: #000;
            display: block;
            margin-bottom: 8px;
        }

        .section-header {
            font-weight: 700;
            font-size: 1.1rem;
            background: #eee;
            padding: 8px 16px;
            margin: 40px 0 24px;
            color: #000;
            border-left: 5px solid #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header .q-range {
            font-weight: 600;
            color: #555;
            font-size: 0.8rem;
        }

        .question {
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            page-break-inside: avoid;
        }

        .q-num {
            font-weight: 700;
            color: #000;
            width: 32px;
            flex-shrink: 0;
            font-size: 0.95rem;
        }

        .q-body {
            flex: 1;
            font-size: 0.95rem;
            color: #111;
        }

        .q-marks {
            color: #000;
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 4px;
            display: block;
            white-space: nowrap;
        }

        .mcq-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .mcq-opt {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #eee;
            background: #fff;
            font-size: 0.9rem;
            color: #333;
        }

        .passage-box {
            background: #f8f8f8;
            padding: 16px 20px;
            border-radius: 0;
            margin: 16px 0;
            border-left: 3px solid #ccc;
            font-size: 0.9rem;
            color: #222;
            font-style: italic;
        }

        .sub-part {
            padding-left: 20px;
            border-left: 1px solid #ccc;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: #222;
        }

        .sub-part::before {
            display: none;
        }

        .assertion-block .ar-label {
            font-weight: 700;
            color: #000;
        }

        .ak-item {
            background: #f0f0f0;
            border: 1px solid #ccc;
            color: #000;
            font-weight: 600;
        }

        .answer-key h3 {
            color: #000;
            border-bottom: 2px solid #000;
            padding-bottom: 8px;
        }

        /* Mobile */
        @media(max-width:768px) {
            .app {
                padding: 40px 16px
            }

            .form-card {
                padding: 32px 24px
            }

            .subject-grid {
                grid-template-columns: repeat(2, 1fr)
            }

            .difficulty-selector {
                grid-template-columns: repeat(2, 1fr)
            }

            .hero-title {
                font-size: 2.5rem
            }

            .mcq-options {
                grid-template-columns: 1fr
            }
        }

        @media(max-width:400px) {
            .subject-grid {
                grid-template-columns: 1fr 1fr
            }

            .paper {
                padding: 12px 10px;
                font-size: 0.78rem
            }
        }
    </style>
</head>

        function setSubject(btn, s) {
            document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSubject = (s === 'Maths') ? 'Mathematics' : s;
            document.getElementById('create-btn').disabled = false
        }
        function setDiff(btn, d) { document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectedDiff = d }
        function setMode(btn, m) {
            document.querySelectorAll('#mode-annual, #mode-ut').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedMode = m;
        }

        function parseFig(text) {
            const imgM = text.match(/\[Image:\s*([^\]]+)\]/i);
            const figM = text.match(/\[Figure:\s*([^\]]+)\]/i);
            const diagM = text.match(/\[Diagram:\s*([^\]]+)\]/i);
            const m = imgM || figM || diagM;
            if (m) return { url: m[1].trim(), clean: text.replace(m[0], '').trim() };
            return { url: null, clean: text };
        }

        // Verix Engine v3.1 (Atlantis Recovery Build)
        async function createPaper() {
            const btn = document.getElementById('create-btn');
            const err = document.getElementById('error-msg');
            btn.disabled = true; btn.textContent = 'Generating...'; err.style.display = 'none';
            try {
                const blueprints = (selectedMode === 'UT') ? BLUEPRINTS_UT : BLUEPRINTS;
                let bp = blueprints[selectedSubject];

                if (!bp) {
                    bp = {
                        fullName: selectedSubject, code: '000', time: '3 Hours', maxMarks: 80,
                        inst: ['All questions are compulsory.', 'Attempt all questions in sequence.'],
                        sections: [{ id: 'A', title: 'General Section', desc: 'Mixed Pattern Review', perQ: 1, count: 30 }]
                    };
                }

                // V3.0: Strict Assembly Coordinator - Target Virtual Views
                const sKey = selectedSubject.toLowerCase().replace(/\s+/g, '_');
                const fetchView = async (vName) => {
                    const { data, error } = await db.from(vName).select('*').limit(40);
                    if (error) return [];
                    return (data || []).sort(() => Math.random() - 0.5);
                };

                // Parallel bucket fetching
                const [v1, v2, v3, v4, v5, vDiag, vAll] = await Promise.all([
                    fetchView(`view_${sKey}_1_markers`),
                    fetchView(`view_${sKey}_2_markers`),
                    fetchView(`view_${sKey}_3_markers`),
                    fetchView(`view_${sKey}_4_markers`),
                    fetchView(`view_${sKey}_5_markers`),
                    fetchView(`view_${sKey}_diagrams`),
                    fetchView(`view_${sKey}_all`)
                ]);

                const POOLS = { 1: v1, 2: v2, 3: v3, 4: v4, 5: v5, 'diag': vDiag, 'all': vAll };

                paperCount++; currentAnswers = [];
                let gNum = 0, used = new Set();
                let html = renderPaperCore(bp, selectedMode);

                bp.sections.forEach(sec => {
                    let marks = sec.perQ || (sec.qType === 'case' ? 4 : (sec.qType === 'map' ? 5 : 1));
                    let pool = [...(POOLS[marks] || [])].filter(q => !used.has(q.id));
                    let startQ = gNum + 1;
                    let secCount = 0;
                    let tempHtml = '';

                    // COORDINATOR: Handle Empty Pools with Weightage Substitution (V3.0)
                    if (pool.length < sec.count && sec.count > 0) {
                        const fallbackPool = [...POOLS[1], ...POOLS['all']].filter(q => !used.has(q.id));
                        pool = [...pool, ...fallbackPool];
                    }

                    if (sec.count > 0) {
                        for (let i = 0; i < sec.count; i++) {
                            let q = pool.find(p => !used.has(p.id));

                            if (!q) {
                                // RENDER PLACEHOLDER: Scraper Active (Directive V3.0)
                                gNum++; secCount++;
                                tempHtml += `<div class="question"><span class="q-num">${gNum}.</span><div class="q-body">
                                    <div style="background:#fefce8;border:1px dashed #eab308;padding:16px;border-radius:4px;color:#854d0e;font-size:0.85rem">
                                        <strong>Question Pending</strong> — Verix Harvester v2.1 is currently scraping additional ${marks}-mark questions for ${selectedSubject}.
                                    </div>
                                </div><span class="q-marks">[${marks}]</span></div>`;
                                continue;
                            }

                            gNum++; secCount++; used.add(q.id);
                            const isAR = (sec.hasAR || q.question_type?.includes('Assertion')) && gNum >= (sec.arStart || 999);

                            if (sec.qType === 'case' || q.question_type?.includes('Case')) {
                                tempHtml += renderCase(q, gNum, sec);
                            } else if (sec.qType === 'map' || q.question_type === 'Map') {
                                tempHtml += renderQ(q, gNum, marks || q.marks);
                                tempHtml += `<div style="text-align:center;padding:12px;border:1px dashed #ccc;margin:10px 0;font-size:0.8rem;">[Map Work Space]</div>`;
                            } else {
                                tempHtml += renderQ(q, gNum, marks || q.marks, { isAR });
                            }
                            if (q.correct_answer) currentAnswers.push({ num: gNum, ans: q.correct_answer });
                        }
                    }

                    if (sec.fixed && sec.fixedSections) {
                        sec.fixedSections.forEach(fs => {
                            tempHtml += `<div style="font-weight:700;font-size:1rem;margin:24px 0 16px;color:#000;border-bottom:1px solid #eee">${fs.label}</div>`;
                            if (fs.count > 0) {
                                let fsPool = [...(POOLS[fs.perQ] || POOLS[1])].filter(q => !used.has(q.id));
                                for (let i = 0; i < fs.count; i++) {
                                    let q = fsPool.find(p => !used.has(p.id));
                                    if (q) {
                                        gNum++; used.add(q.id);
                                        tempHtml += renderQ(q, gNum, fs.perQ);
                                    }
                                }
                            } else if (fs.fixedNote) {
                                tempHtml += `<div class="passage-box">${fs.fixedNote}</div>`;
                            }
                        });
                    }

                    if (tempHtml) {
                        html += `<div class="section-header">${sec.title} — ${sec.desc} <span class="q-range">Q.${startQ} to Q.${gNum}</span></div>`;
                        html += tempHtml;
                    }
                });

                html += `<div style="text-align:center;margin-top:100px;font-size:0.8rem;color:var(--text-dim);padding-top:40px">— End of Question Paper —</div></div>`;
                document.getElementById('paper-content').innerHTML = html;
                document.getElementById('selection-view').style.display = 'none';
                document.getElementById('paper-view').style.display = 'block';
                updateStatsBar(gNum);
            } catch (e) { err.textContent = e.message; err.style.display = 'block' }
            finally { btn.disabled = false; btn.textContent = 'Generate Question Paper' }
        }

        function renderPaperCore(bp, mode) {
            return `<div class="paper ${bp.lang || ''}">
                <div class="paper-header">
                    <div class="school-line">Central Board of Secondary Education</div>
                    <div class="exam-line">${mode === 'UT' ? 'PERIODIC TEST' : 'ANNUAL EXAMINATION'} (2025-26)</div>
                    <div class="subject-line">${bp.fullName} • Class IX</div>
                </div>
                <div class="paper-meta">
                    <span>Time Allowed: ${bp.time}</span>
                    <span>Max Marks: ${bp.maxMarks}</span>
                </div>
                <div class="paper-instructions">
                    <strong>General Instructions:</strong>
                    <ol>${bp.inst.map(i => `<li>${i}</li>`).join('')}</ol>
                </div>`;
        }

        function validateUrl(url) {
            if (!url) return false;
            return (url.startsWith('http') || url.startsWith('https') || url.startsWith('data:image'));
        }

        function renderQ(q, num, marks, opts = {}) {
            const raw = q.question_text || '';
            const fig = parseFig(raw);
            let url = validateUrl(q.diagram_url || fig.url) ? (q.diagram_url || fig.url) : null;
            let text = fig.clean;
            let html = `<div class="question"><span class="q-num">${num}.</span><div class="q-body">`;

            if (url) html += `<div class="figure-box"><img src="${url}" class="q-image" referrerpolicy="no-referrer" onerror="this.style.display='none';"></div>`;

            if (opts.isAR) {
                html += `<div class="assertion-block">
                    <p><span class="ar-label">Assertion (A):</span> ${text}</p>
                    <p><span class="ar-label">Reason (R):</span> ${q.correct_answer_explanation || 'The reason provided explains the assertion.'}</p>
                    <div class="mcq-options single-col">
                        <div class="mcq-opt">(a) Both A and R are true and R is the correct explanation of A.</div>
                        <div class="mcq-opt">(b) Both A and R are true but R is not the correct explanation of A.</div>
                        <div class="mcq-opt">(c) A is true but R is false.</div>
                        <div class="mcq-opt">(d) A is false but R is true.</div>
                    </div>
                </div>`;
            } else if (q.option_a) {
                const singleCol = text.length > 100 || (q.option_a && q.option_a.length > 40);
                html += `<p>${text}</p><div class="mcq-options ${singleCol ? 'single-col' : ''}">
                    <div class="mcq-opt">(a) ${q.option_a}</div>
                    <div class="mcq-opt">(b) ${q.option_b}</div>
                    <div class="mcq-opt">(c) ${q.option_c}</div>
                    <div class="mcq-opt">(d) ${q.option_d}</div>
                </div>`;
            } else {
                html += `<p>${text}</p>`;
            }

            html += `</div><span class="q-marks">[${marks}]</span></div>`;
            return html;
        }

        function renderCase(q, gNum, sec) {
            const fig = parseFig(q.question_text || '');
            let url = validateUrl(q.diagram_url || fig.url) ? (q.diagram_url || fig.url) : null;
            let html = `<div class="question"><span class="q-num">${gNum}.</span><div class="q-body">`;
            if (url) html += `<div class="figure-box"><img src="${url}" class="q-image" referrerpolicy="no-referrer" onerror="this.style.display='none';"></div>`;
            const caseText = fig.clean;
            const subMatch = caseText.match(/\((i|a)\)/);
            if (subMatch) {
                const passage = caseText.substring(0, subMatch.index).trim();
                const subText = caseText.substring(subMatch.index);
                html += `<div class="passage-box">${passage}</div>`;
                const subs = subText.match(/\((?:i|ii|iii|iv|a|b|c|d)\)[^(]*/g);
                if (subs) {
                    html += `<div class="sub-parts">`;
                    subs.forEach((s, idx) => {
                        const m = (sec.caseSubParts && sec.caseSubParts[idx]) ? sec.caseSubParts[idx] : 1;
                        html += `<div class="sub-part">${s.trim()} <span class="q-marks">[${m}]</span></div>`;
                    });
                    html += `</div>`;
                }
            } else {
                html += `<div class="passage-box">${caseText}</div>`;
            }
            html += `</div><span class="q-marks">[${sec.perQ}]</span></div>`;
            return html;
        }

        function toggleAnswers() {
            const btn = document.getElementById('ans-btn');
            const existing = document.getElementById('answer-key-section');
            if (existing) {
                existing.remove();
                btn.textContent = 'Show Answer Key';
            } else {
                let html = `<div id="answer-key-section" class="answer-key"><h3>Answer Key / Marking Scheme</h3><div class="ak-grid">`;
                currentAnswers.forEach(a => {
                    html += `<div class="ak-item">Q.${a.num}: <strong>${a.ans}</strong></div>`;
                });
                html += `</div></div>`;
                document.getElementById('paper-content').insertAdjacentHTML('beforeend', html);
                btn.textContent = 'Hide Answer Key';
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        function updateStatsBar(gCount) {
            document.getElementById('stats-bar').innerHTML = `
                <span>📄 ${selectedMode} • #${paperCount}</span>
                <span>✅ ${gCount} Questions Generated</span>
                <span>✨ Wispr Flow Engine V2.8</span>
            `;
        }
    </script>
