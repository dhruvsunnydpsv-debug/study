<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Paper Creator | Study Vault</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #06060b;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --text: #eeeef2;
            --text-dim: rgba(238, 238, 242, 0.55);
            --accent: #7c3aed
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .aurora div {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.1;
            animation: drift 22s ease-in-out infinite
        }

        .aurora div:nth-child(1) {
            width: 550px;
            height: 550px;
            background: #7c3aed;
            top: -8%;
            left: -3%
        }

        .aurora div:nth-child(2) {
            width: 450px;
            height: 450px;
            background: #06b6d4;
            top: 35%;
            right: -8%;
            animation-delay: -8s
        }

        @keyframes drift {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            33% {
                transform: translate(25px, -35px) scale(1.04)
            }

            66% {
                transform: translate(-20px, 25px) scale(0.96)
            }
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 24px 80px
        }

        .hero-title {
            font-size: clamp(2rem, 5vw, 3.4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #f0f0f5 10%, #a78bfa 55%, #06b6d4 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.15;
            margin-bottom: 10px;
            text-align: center
        }

        .hero-sub {
            color: var(--text-dim);
            text-align: center;
            max-width: 520px;
            margin: 0 auto 44px;
            font-size: 1rem
        }

        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            max-width: 620px;
            margin: 0 auto
        }

        .form-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 15px;
            display: block
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 28px
        }

        .subject-btn {
            padding: 15px 5px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px
        }

        .subject-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: var(--surface-hover)
        }

        .subject-btn.active {
            background: rgba(124, 58, 237, 0.15);
            border-color: var(--accent);
            color: white
        }

        .difficulty-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 24px
        }

        .diff-btn {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.7rem
        }

        .diff-btn.active {
            background: rgba(6, 182, 212, 0.1);
            border-color: #06b6d4;
            color: #67e8f9
        }

        .create-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s
        }

        .create-btn:hover:not(:disabled) {
            background: #6d28d9;
            transform: translateY(-1px)
        }

        .create-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed
        }

        #paper-view {
            display: none
        }

        .paper-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap
        }

        .action-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s
        }

        .action-btn:hover {
            background: var(--surface-hover);
            color: white
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 0.75rem;
            color: var(--text-dim)
        }

        .stats-bar span {
            background: var(--surface);
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--border)
        }

        /* Paper Styles - Exact CBSE Format */
        .paper {
            background: white;
            color: #111;
            padding: 40px 50px;
            border-radius: 5px;
            font-family: 'Noto Serif', serif;
            line-height: 1.7;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            font-size: 0.9rem
        }

        .paper.hi,
        .paper.sa {
            font-family: 'Noto Sans Devanagari', serif
        }

        .paper-header {
            text-align: center;
            border-bottom: 2px solid #111;
            padding-bottom: 12px;
            margin-bottom: 0
        }

        .paper-header .school-line {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: #555;
            text-transform: uppercase
        }

        .paper-header .exam-line {
            font-weight: 700;
            font-size: 1.15rem;
            margin: 4px 0
        }

        .paper-header .subject-line {
            font-size: 0.95rem;
            font-weight: 600
        }

        /* MCQ Options Styling */
        .mcq-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 10px 0;
            padding-left: 20px;
        }

        .mcq-options.single-col {
            grid-template-columns: 1fr;
        }

        .mcq-opt {
            font-size: 0.85rem;
            color: #333;
        }

        .paper-header .code-line {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px
        }

        .paper-meta {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ccc;
            padding: 8px 0;
            font-size: 0.85rem;
            font-weight: 500
        }

        .paper-instructions {
            border: 1px solid #333;
            padding: 12px 16px;
            margin: 14px 0 20px;
            font-size: 0.78rem;
            background: #fafafa;
            line-height: 1.8
        }

        .paper-instructions strong {
            display: block;
            margin-bottom: 6px;
            font-size: 0.82rem
        }

        .paper-instructions ol {
            padding-left: 18px
        }

        .paper-instructions li {
            margin-bottom: 3px
        }

        .section-header {
            font-weight: 700;
            background: #f0f0f0;
            padding: 8px 14px;
            margin: 24px 0 14px;
            border-left: 4px solid #222;
            font-size: 0.88rem;
            letter-spacing: 0.02em
        }

        .section-header .q-range {
            float: right;
            font-weight: 400;
            color: #666;
            font-size: 0.78rem
        }

        .question {
            display: flex;
            margin-bottom: 16px;
            page-break-inside: avoid
        }

        .q-num {
            font-weight: 700;
            width: 32px;
            flex-shrink: 0;
            font-size: 0.88rem
        }

        .q-body {
            flex: 1
        }

        .q-marks {
            font-weight: 700;
            font-size: 0.78rem;
            margin-left: 10px;
            white-space: nowrap;
            color: #333
        }

        .mcq-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 20px;
            margin-top: 6px;
            padding-left: 8px
        }

        .mcq-options.single-col {
            grid-template-columns: 1fr
        }

        .mcq-opt {
            font-size: 0.85rem;
            padding: 2px 0
        }

        .figure-box {
            margin: 8px 0;
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 4px;
            background: #fff
        }

        .q-image {
            max-width: 100%;
            max-height: 220px;
            border: 1px solid #ddd;
            border-radius: 3px
        }

        .sub-parts {
            margin-top: 6px;
            padding-left: 16px
        }

        .sub-part {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 0.85rem
        }

        .or-divider {
            text-align: center;
            font-style: italic;
            font-weight: 700;
            margin: 12px 0;
            color: #555;
            font-size: 0.9rem;
            letter-spacing: 0.05em
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            display: inline-block;
            width: 60px;
            height: 1px;
            background: #aaa;
            vertical-align: middle;
            margin: 0 10px
        }

        .assertion-block {
            margin-top: 4px;
            padding-left: 4px;
            font-size: 0.85rem;
            line-height: 1.7
        }

        .assertion-block .ar-label {
            font-weight: 600
        }

        .case-study-intro {
            font-style: italic;
            margin-bottom: 8px;
            padding: 8px 12px;
            background: #f8f8f8;
            border-left: 3px solid #7c3aed;
            border-radius: 0 4px 4px 0;
            font-size: 0.84rem;
            line-height: 1.7
        }

        .fixed-section-note {
            text-align: center;
            padding: 16px;
            font-style: italic;
            color: #666;
            font-size: 0.82rem;
            border: 1px dashed #ccc;
            border-radius: 6px;
            margin: 8px 0
        }

        .answer-key {
            margin-top: 24px;
            border-top: 2px solid #111;
            padding-top: 14px
        }

        .answer-key h3 {
            font-size: 0.9rem;
            margin-bottom: 10px
        }

        .answer-key .ak-item {
            display: inline-block;
            width: 120px;
            font-size: 0.78rem;
            margin-bottom: 4px
        }

        /* Print */
        @media print {

            .aurora,
            .paper-actions,
            .hero-title,
            .hero-sub,
            .form-card,
            .stats-bar,
            #selection-view {
                display: none !important
            }

            body {
                background: white
            }

            .paper {
                box-shadow: none;
                padding: 20px 30px;
                max-width: 100%
            }

            .question {
                page-break-inside: avoid
            }

            .section-header {
                page-break-after: avoid
            }

            .answer-key {
                page-break-before: always
            }
        }

        /* Mobile */
        @media(max-width:768px) {
            .app {
                padding: 24px 12px 60px
            }

            .hero-title {
                font-size: 1.6rem
            }

            .hero-sub {
                font-size: 0.85rem;
                margin-bottom: 24px
            }

            .form-card {
                padding: 20px 16px
            }

            .subject-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px
            }

            .difficulty-selector {
                grid-template-columns: repeat(2, 1fr)
            }

            .paper {
                padding: 20px 16px;
                font-size: 0.82rem
            }

            .mcq-options {
                grid-template-columns: 1fr
            }

            .question {
                flex-wrap: wrap
            }

            .q-image {
                max-height: 160px
            }
        }

        @media(max-width:400px) {
            .subject-grid {
                grid-template-columns: 1fr 1fr
            }

            .paper {
                padding: 12px 10px;
                font-size: 0.78rem
            }
        }
    </style>
</head>

        function parseFig(text) {
            const imgM = text.match(/\[Image:\s*([^\]]+)\]/i);
            const figM = text.match(/\[Figure:\s*([^\]]+)\]/i);
            const diagM = text.match(/\[Diagram:\s*([^\]]+)\]/i);
            const m = imgM || figM || diagM;
            if (m) return { url: m[1].trim(), clean: text.replace(m[0], '').trim() };
            return { url: null, clean: text };
        }

        function getImgTopic(url) {
            try {
                const parts = url.split('/');
                const fname = parts[parts.length - 1].replace(/^\d+px-/, '').replace(/\.\w+$/, '').replace(/_/g, ' ').replace(/\s+/g, ' ');
                return fname.substring(0, 40);
            } catch (e) { return 'Diagram'; }
        }

        function renderQ(q, num, marks, opts = {}) {
            const raw = q.question_text || '';
            const fig = parseFig(raw);
            let url = q.diagram_url || fig.url;
            let text = fig.clean;
            let html = `<div class="question"><span class="q-num">${num}.</span><div class="q-body">`;

            // NEW: Handle Parent-Child Clusters (Passages/Case Studies)
            if (q.options && q.options.passage_text) {
                html += `<div class="passage-box" style="background:rgba(124,58,237,0.05);padding:15px;border-left:4px solid var(--accent);margin:10px 0;font-style:italic;color:#333;font-family:'Inter',sans-serif">`;
                html += `<strong>Read the following and answer correctly:</strong><br><br>${q.options.passage_text}</div>`;

                if (q.options.sub_questions) {
                    q.options.sub_questions.forEach((sub, idx) => {
                        html += `<div class="sub-question" style="margin-top:15px;padding-left:15px;border-left:2px solid #eee">`;
                        html += `<div class="sub-body">`;
                        html += `<span style="font-weight:600">(${idx + 1})</span> ${sub.text}`;

                        if (sub.choices) {
                            const isL = Object.values(sub.choices).some(v => v.length > 50);
                            html += `<div class="mcq-options${isL ? ' single-col' : ''}" style="margin-top:5px">`;
                            for (const [k, v] of Object.entries(sub.choices)) {
                                html += `<div class="mcq-opt">(${k}) ${v}</div>`;
                            }
                            html += `</div>`;
                        }
                        html += `</div></div>`;
                    });
                }
                html += `</div></div>`;
                return html;
            }

            // Image at top
            if (url) {
                const topic = getImgTopic(url);
                html += `<div class="figure-box"><img src="${url}" class="q-image" alt="${topic}" referrerpolicy="no-referrer" onerror="this.onerror=null;this.style.display='none';"></div>`;
            }

            // NEW: Handle Parent-Child Clusters (Passages/Case Studies)
            if (q.options && q.options.passage_text) {
                html += `<div class="passage-box" style="background:#f4f4f4;padding:15px;border-left:4px solid var(--accent);margin:10px 0;font-style:italic">`;
                html += `<strong>Read the following and answer:</strong><br>${q.options.passage_text}</div>`;

                if (q.options.sub_questions) {
                    q.options.sub_questions.forEach((sub, idx) => {
                        html += `<div class="sub-question" style="margin-top:15px;padding-left:15px;border-left:2px solid #ddd">`;
                        html += `<span class="sub-num">${num}.${idx + 1}</span> <div class="sub-body" style="display:inline-block;width:calc(100% - 40px);vertical-align:top">`;
                        html += `<div>${sub.text}</div>`;

                        if (sub.choices) {
                            const isL = Object.values(sub.choices).some(v => v.length > 50);
                            html += `<div class="mcq-options${isL ? ' single-col' : ''}" style="margin-top:5px">`;
                            for (const [k, v] of Object.entries(sub.choices)) {
                                html += `<div class="mcq-opt">(${k}) ${v}</div>`;
                            }
                            html += `</div>`;
                        }
                        html += `</div></div>`;
                    });
                }
                html += `</div></div>`;
                return html;
            }

            // Standard JSONB options (Standalone MCQs)
            if (q.options && !q.options.passage_text) {
                html += `<div>${text}</div>`;
                const isLong = Object.values(q.options).some(v => v.length > 50);
                html += `<div class="mcq-options${isLong ? ' single-col' : ''}" style="margin-top:6px">`;
                for (const [k, v] of Object.entries(q.options)) {
                    html += `<div class="mcq-opt">(${k}) ${v}</div>`;
                }
                html += `</div>`;
            }
            // Assertion-Reason format
            else if (opts.isAR) {
                const arParts = text.split(/Reason\s*\(R\)\s*:/i);
                const assertion = arParts[0].replace(/Assertion\s*\(A\)\s*:/i, '').trim();
                const reason = arParts[1] ? arParts[1].split(/\(a\)/i)[0].trim() : text;
                html += `<div class="assertion-block">
                    <div><span class="ar-label">Assertion (A):</span> ${assertion}</div>
                    <div><span class="ar-label">Reason (R):</span> ${reason}</div>
                    <div class="mcq-options single-col" style="margin-top:6px">
                        <div class="mcq-opt">(a) Both A and R are true and R is the correct explanation of A</div>
                        <div class="mcq-opt">(b) Both A and R are true but R is NOT the correct explanation of A</div>
                        <div class="mcq-opt">(c) A is true but R is false</div>
                        <div class="mcq-opt">(d) A is false but R is true</div>
                    </div>
                </div>`;
            }
            // MCQ with (a)(b)(c)(d) or (A)(B)(C)(D)
            else if (text.match(/\([A-Da-d]\)\s/)) {
                const upperMatch = text.match(/\(A\)/);
                const sep = upperMatch ? /\(([A-D])\)/g : /\(([a-d])\)/g;
                const firstOpt = upperMatch ? '(A)' : '(a)';
                const parts = text.split(firstOpt);
                const mainText = parts[0].trim();
                const optStr = firstOpt + (parts[1] || '');
                const options = optStr.match(upperMatch ? /\([A-D]\)[^(]*/g : /\([a-d]\)[^(]*/g);

                html += `<div>${mainText}</div>`;
                if (options) {
                    const longOpts = options.some(o => o.trim().length > 40);
                    html += `<div class="mcq-options${longOpts ? ' single-col' : ''}" style="margin-top:4px">`;
                    options.forEach(o => html += `<div class="mcq-opt">${o.trim()}</div>`);
                    html += `</div>`;
                }
            }
            // Sub-parts (i)(ii)(iii) or (a)(b)(c)
            else if (text.match(/\((i|ii|iii|iv)\)/) || text.match(/\(a\).*\(b\)/s)) {
                const subSep = text.match(/\((i)\)/) ? /\((i|ii|iii|iv|v)\)/g : /\(([a-e])\)/g;
                const firstSub = text.match(/\((i)\)/) ? '(i)' : '(a)';
                const mainPart = text.split(firstSub)[0].trim();
                const subStr = text.substring(mainPart.length);
                const subs = subStr.match(text.match(/\((i)\)/) ? /\((?:i|ii|iii|iv|v)\)[^(]*/g : /\([a-e]\)[^(]*/g);

                html += `<div>${mainPart}</div>`;
                if (subs) {
                    html += `<div class="sub-parts">`;
                    subs.forEach(s => html += `<div class="sub-part">${s.trim()}</div>`);
                    html += `</div>`;
                }
            }
            else {
                html += `<div>${text}</div>`;
            }

            html += `</div><span class="q-marks">[${marks}]</span></div>`;
            return html;
        }

        async function createPaper() {
            const btn = document.getElementById('create-btn');
            const err = document.getElementById('error-msg');
            btn.disabled = true; btn.textContent = 'Generating...'; err.style.display = 'none';
            try {
                const blueprints = (selectedMode === 'UT') ? BLUEPRINTS_UT : BLUEPRINTS;
                const bp = blueprints[selectedSubject];
                if (!bp) throw new Error(`Blueprint not found for ${selectedSubject} in ${selectedMode} mode.`);

                // 1. SEGREGATED FETCHING (DIRECTIVE V2.7)
                const qKey = (selectedSubject === 'Mathematics') ? 'Math%' : `${selectedSubject}%`;

                const fetchPool = async (typeArr, marks, limit = 50) => {
                    const { data, error } = await db.from('class9_question_bank')
                        .select('*')
                        .ilike('subject', qKey)
                        .in('question_type', typeArr)
                        .eq('marks', marks)
                        .limit(limit);
                    if (error) throw error;
                    return (data || []).sort(() => Math.random() - 0.5);
                };

                const [poolA, poolB, poolC, poolD, poolE, poolMap] = await Promise.all([
                    fetchPool(['MCQ', 'Assertion-Reason', 'Assertion-Reasoning'], 1, 40),
                    fetchPool(['Very Short Answer', 'VSA'], 2, 20),
                    fetchPool(['Short Answer', 'SA'], 3, 20),
                    fetchPool(['Long Answer', 'LA'], 5, 10),
                    fetchPool(['Case-Based', 'Case Study', 'Case study'], 4, 10),
                    fetchPool(['Map', 'Map Work', 'Map Pointing'], 2, 5)
                ]);

                const POOLS = { 'mcq': poolA, 'vsa': poolB, 'sa': poolC, 'la': poolD, 'case': poolE, 'map': poolMap };

                paperCount++;
                currentAnswers = [];

                // ===== PAPER HEADER =====
                let html = `<div class="paper ${bp.lang || ''}">
                    <div class="paper-header">
                        <div class="school-line">Central Board of Secondary Education</div>
                        <div class="exam-line">${selectedMode === 'UT' ? 'PERIODIC TEST / UNIT TEST' : 'ANNUAL EXAMINATION'} (2025-26)</div>
                        <div class="subject-line">${bp.fullName}</div>
                        <div class="code-line">Subject Code: ${bp.code} | Class: IX</div>
                    </div>
                    <div class="paper-meta">
                        <span>Time Allowed: ${bp.time}</span>
                        <span>Maximum Marks: ${bp.maxMarks}</span>
                    </div>
                    <div class="paper-meta" style="border-bottom:none;font-size:0.78rem;color:#666">
                        <span>Date: ___________</span>
                        <span>Roll No: ___________</span>
                    </div>
                    <div class="paper-instructions">
                        <strong>General Instructions:</strong>
                        <ol>`;
                bp.inst.forEach(i => html += `<li>${i}</li>`);
                html += `</ol></div>`;

                // ===== SECTIONS (Strict Blueprint) =====
                let gNum = 0, used = new Set();
                bp.sections.forEach(sec => {
                    let startQ = gNum + 1;
                    let endQ = gNum + (sec.count || 0);
                    let rangeStr = sec.count > 0 ? `(Q.${startQ} to Q.${endQ})` : '';
                    html += `<div class="section-header">${sec.title} — ${sec.desc} ${sec.perQ > 0 ? '(' + sec.perQ + ' mark' + (sec.perQ > 1 ? 's' : '') + ' each)' : ''} <span class="q-range">${rangeStr}</span></div>`;

                    if (sec.count > 0) {
                        let sType = sec.qType || (sec.perQ === 2 ? 'vsa' : sec.perQ === 3 ? 'sa' : sec.perQ === 5 ? 'la' : 'mcq');
                        let sectionPool = (POOLS[sType] || poolA).filter(q => !used.has(q.id));

                        if (sec.forceDiagram) {
                            sectionPool.sort((a, b) => (b.diagram_url ? 1 : 0) - (a.diagram_url ? 1 : 0));
                        }

                        let count = 0;
                        for (let q of sectionPool) {
                            const qDiff = q.difficulty || 'Medium';
                            if (selectedDiff !== 'Mixed' && qDiff !== selectedDiff) continue;

                            gNum++; count++; used.add(q.id);
                            const isAR = (sec.hasAR || q.question_type.includes('Assertion')) && gNum >= (sec.arStart || 999);

                            if (sec.qType === 'case') {
                                html += `<div class="question"><span class="q-num">${gNum}.</span><div class="q-body">`;
                                const fig = parseFig(q.question_text || '');
                                let caseText = fig.clean;
                                let url = q.diagram_url || fig.url;
                                if (url) {
                                    html += `<div class="figure-box"><img src="${url}" class="q-image" referrerpolicy="no-referrer" onerror="this.onerror=null;this.style.display='none';"></div>`;
                                }
                                const subMatch = caseText.match(/\((i|a)\)/);
                                if (subMatch) {
                                    const passage = caseText.substring(0, subMatch.index).trim();
                                    const subText = caseText.substring(subMatch.index);
                                    html += `<div class="case-study-intro">${passage}</div>`;
                                    const subs = subText.match(/\((?:i|ii|iii|iv|a|b|c|d)\)[^(]*/g);
                                    if (subs && sec.caseSubParts) {
                                        html += `<div class="sub-parts">`;
                                        subs.forEach((s, idx) => {
                                            const m = sec.caseSubParts[idx] || 1;
                                            html += `<div class="sub-part">${s.trim()} <span class="q-marks">[${m}]</span></div>`;
                                        });
                                        html += `</div>`;
                                    } else { html += `<div>${subText}</div>`; }
                                } else {
                                    html += `<div class="case-study-intro">${caseText}</div>`;
                                    if (sec.caseSubParts) {
                                        html += `<div class="sub-parts">`;
                                        sec.caseSubParts.forEach((m, i) => {
                                            html += `<div class="sub-part">(${String.fromCharCode(105 + i)}) [Answer Based on Passage] <span class="q-marks">[${m}]</span></div>`;
                                        });
                                        html += `</div>`;
                                    }
                                }
                                html += `</div><span class="q-marks">[${sec.perQ}]</span></div>`;
                            } else if (sec.qType === 'map') {
                                html += renderQ(q, gNum, sec.perQ);
                                html += `<div style="text-align:center;padding:12px;font-style:italic;font-size:0.8rem;color:#555">Map of India attached separately</div>`;
                            } else {
                                html += renderQ(q, gNum, sec.perQ, { isAR });
                            }

                            if (q.correct_answer) currentAnswers.push({ num: gNum, ans: q.correct_answer });
                            if (count >= sec.count) break;
                        }
                    } else if (sec.fixed && sec.fixedSections) {
                        sec.fixedSections.forEach(fs => {
                            html += `<div style="font-weight:600;font-size:0.84rem;margin:12px 0 8px;padding-left:4px;border-left:3px solid var(--accent);padding:4px 8px;background:#f8f8ff">${fs.label} — ${fs.marks} Marks</div>`;
                            if (fs.count > 0 && fs.perQ > 0) {
                                let fsCount = 0;
                                let sType = fs.qType || (fs.perQ === 2 ? 'vsa' : fs.perQ === 3 ? 'sa' : fs.perQ === 5 ? 'la' : 'mcq');
                                let sectionPool = (POOLS[sType] || poolA).filter(q => !used.has(q.id));
                                for (let q of sectionPool) {
                                    const qDiff = q.difficulty || 'Medium';
                                    if (selectedDiff !== 'Mixed' && qDiff !== selectedDiff) continue;
                                    gNum++; fsCount++; used.add(q.id);
                                    html += renderQ(q, gNum, fs.perQ);
                                    if (q.correct_answer) currentAnswers.push({ num: gNum, ans: q.correct_answer });
                                    if (fsCount >= fs.count) break;
                                }
                            } else if (fs.fixedNote) {
                                html += `<div class="fixed-section-note">${fs.fixedNote}</div>`;
                            }
                        });
                    }
                });

                // End paper
                html += `<div style="text-align:center;margin-top:30px;font-size:0.8rem;color:#888;border-top:1px solid #ddd;padding-top:12px">— End of Question Paper —</div>`;
                html += `</div>`;

                document.getElementById('paper-content').innerHTML = html;
                document.getElementById('selection-view').style.display = 'none';
                document.getElementById('paper-view').style.display = 'block';

                const totalInDb = poolA.length + poolB.length + poolC.length + poolD.length + poolE.length;
                document.getElementById('stats-bar').innerHTML = `
                    <span>📄 ${selectedMode} Paper #${paperCount}</span>
                    <span>📊 ${totalInDb} relevant in db</span>
                    <span>✅ ${gNum} generated</span>
                `;
            } catch (e) { err.textContent = e.message; err.style.display = 'block' }
            finally { btn.disabled = false; btn.textContent = 'Generate Question Paper' }
        }
    </script>
</body>

</html>
