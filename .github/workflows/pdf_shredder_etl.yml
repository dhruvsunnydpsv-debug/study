name: PDF Shredder ETL — Manual Trigger

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL or local path to the PDF to shred'
        required: true
        type: string
      subject:
        description: 'Subject (Science | Mathematics | Social Science | English)'
        required: true
        default: 'Science'
        type: choice
        options:
          - Science
          - Mathematics
          - Social Science
          - English
      chapter:
        description: 'Chapter name (optional, default: Unknown)'
        required: false
        default: 'Unknown'
        type: string

jobs:
  shred:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pymupdf google-generativeai supabase httpx Pillow requests

      - name: Run PDF Shredder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python pdf_shredder.py "${{ inputs.pdf_url }}" \
            --subject "${{ inputs.subject }}" \
            --chapter "${{ inputs.chapter }}"

      - name: Upload Shredder Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shredder-log-${{ github.run_id }}
          path: shredder.log
          retention-days: 14
