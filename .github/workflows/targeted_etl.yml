name: Targeted Class 9 Asset Hunter

on:
  schedule:
    - cron: '30 */3 * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 supabase

      - name: Execute Targeted Hunter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python targeted_harvester.py

      - name: Upload Logging
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: targeted-hunt-logs
          path: targeted_harvest.log
